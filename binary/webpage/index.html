<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Unit Configuration</title><style>body{font-family:helvetica,sans-serif;max-width:480px;margin:1em auto;padding:0 1em}input{width:100%;padding:.5em;margin:.25em 0;box-sizing:border-box}label{display:block;margin-top:1em}button{margin-top:1em;padding:.6em 1em}button[disabled]{opacity:.5}#status{margin-top:1em;padding:.6em;border-radius:4px;font-weight:500}.s-info{background:#e7f3ff;color:#06467a}.s-ok{background:#e6f8ec;color:#1a6b32}.s-err{background:#fde7e9;color:#8a1c25}</style></head><body><h1>Configuration</h1><form id="config" autocomplete="off"><label>WiFi SSID<input type="text" name="ssid" required maxlength="32" autocomplete="off"></label><label>WiFi Password<input type="password" name="pass" maxlength="64" autocomplete="new-password"></label><label>Device ID<input type="text" name="device_id" required inputmode="numeric" pattern="[0-9]+" maxlength="10"></label><label>Backend Address<input type="url" name="address" value="https://sadra.nl/api/" required maxlength="240" pattern="https://.+"></label><label>Device Token<input type="password" name="token" required maxlength="63" autocomplete="off" placeholder="shdev_..."></label><button type="submit">Submit</button></form><p id="status"></p><script>(()=>{const f=document.getElementById("config");const s=document.getElementById("status");const b=f.querySelector("button");let pollTimer=0;const setStatus=(cls,msg)=>{s.className=cls;s.textContent=msg};const stopPolling=()=>{if(pollTimer){clearTimeout(pollTimer);pollTimer=0}};const labelFor=(state,message)=>{if(message)return message;switch(state){case"saving":return"Saving...";case"connecting":return"Connecting to WiFi...";case"probing":return"Verifying backend...";case"success":return"Saved. Device rebooting...";case"failed":return"Failed";default:return state}};let netErrors=0;const maxNetErrors=15;const poll=async()=>{try{const r=await fetch("/status",{cache:"no-store"});if(!r.ok)throw new Error("status "+r.status);const j=await r.json();netErrors=0;const txt=labelFor(j.state,j.message);if(j.state==="success"){setStatus("s-ok",txt);stopPolling();return}if(j.state==="failed"){setStatus("s-err",txt);b.disabled=false;stopPolling();return}setStatus("s-info",txt);pollTimer=setTimeout(poll,1000)}catch(err){netErrors++;if(netErrors>=maxNetErrors){setStatus("s-err","Lost contact with device. If success was expected, reconnect to its WiFi. Otherwise retry.");b.disabled=false;stopPolling();return}pollTimer=setTimeout(poll,1000)}};f.onsubmit=async e=>{e.preventDefault();stopPolling();b.disabled=true;setStatus("s-info","Submitting...");try{const r=await fetch("/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(Object.fromEntries(new FormData(f).entries()))});if(!r.ok){const msg=await r.text();setStatus("s-err","Rejected: "+(msg||r.status));b.disabled=false;return}setStatus("s-info","Saving...");pollTimer=setTimeout(poll,500)}catch(err){setStatus("s-err","Error: "+err.message);b.disabled=false}}})();</script></body></html>
