[env]
check_skip_packages = yes
check_flags =
	--enable=all
	--suppress=preprocessorErrorDirective:*ArduinoJson*
	--suppress=unmatchedSuppression
check_src_filters =
	+<src/>
	+<include/>
	+<lib/sensorhub_core/>
	+<test/test_native/>

[esp32_base]
platform = espressif32
framework = espidf
board = esp32dev
upload_speed = 921000
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_unflags = -fuse-cxa-atexit
build_flags =
	-Wno-missing-field-initializers
	-Wextra
board_build.partitions = partitions.csv
board_build.embed_txtfiles =
	binary/webpage/index.html
board_upload.flash_size = 4MB
board_build.flash_size = 4MB
lib_deps = bblanchon/ArduinoJson
test_ignore = test_native

[env:release]
extends = esp32_base
build_type = release
build_flags =
	${esp32_base.build_flags}
	-Ofast

[env:debug]
extends = esp32_base
build_type = debug
build_flags =
	${esp32_base.build_flags}
	-D UNIT_DEBUG

[env:native]
platform = native
test_framework = unity
test_filter = test_native
build_flags =
	-std=c++26
	-Wall
	-Wextra
	-I lib/sensorhub_core/include
